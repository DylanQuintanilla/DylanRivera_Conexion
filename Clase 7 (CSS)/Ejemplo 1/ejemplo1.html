<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de incluir CSS a una pagina web</title>
    <!--Esta etiqueta sirve para vincular el css-->
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Este título usa el estilo externo</h1>
    <h2>Este subtítulo usa el estilo interno</h2>
    <p style="color: red;">Este texto usa el estilo en la misma etiqueta HTML.</p>
    <h2>Veamos si eso es cierto que este texto sera azul</h2>
    <h3 style="color: yellow;">Este sera de color amarillo</h3>
</body>
</html>
