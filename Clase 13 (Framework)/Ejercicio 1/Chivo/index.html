<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con Tailwind CSS</title>

    <!-- Enlace a Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Enlace a Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="min-h-screen bg-red-500 flex items-center justify-center font-sans">
    <!-- Contenedor principal -->
    <div class="bg-white p-8 rounded-lg shadow-md text-center max-w-sm">
        <h1 class="text-4xl font-bold text-gray-800 mb-10">Hola Mundo</h1>
        <p class="text-gray-600 mb-6 leading-relaxed">
            Este es un ejemplo usando HTML y las clases de utilidad de Tailwind CSS.
        </p>
        <!-- Botón con clases de Tailwind CSS -->
        <button class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded transition duration-500">
            Haz clic aquí
        </button>
        
    </div>

    <div class="card" style="width: 18rem;">
  <img src="..." class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">Card title</h5>
    <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card’s content.</p>
    <a href="#" class="btn btn-primary">Go somewhere</a>
  </div>
</div>

</body>
</html>
