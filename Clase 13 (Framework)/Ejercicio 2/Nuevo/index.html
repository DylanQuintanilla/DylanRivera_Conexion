<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-gray-800 text-white p-4 md:px-8 flex flex-col md:flex-row justify-between items-center gap-4 md:gap-0">
        <div class="text-xl font-bold">MiLogo</div>
        <nav>
            <ul class="flex gap-6">
                <li><a href="#" class="hover:text-blue-400 transition">Inicio</a></li>
                <li><a href="#" class="hover:text-blue-400 transition">Servicios</a></li>
                <li><a href="#" class="hover:text-blue-400 transition">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="text-center py-16 px-8 bg-blue-50">
            <h1 class="text-4xl font-bold text-blue-900 mb-4">Bienvenido a nuestro sitio</h1>
            <p class="text-gray-600 text-lg">Creamos soluciones digitales para hacer crecer tu negocio.</p>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-8 p-12 max-w-7xl mx-auto">
            
            <div class="bg-white p-8 rounded-lg shadow-md text-center hover:-translate-y-1 transition duration-300">
                <h3 class="text-xl font-bold text-blue-600 mb-4">Diseño Web</h3>
                <p class="text-gray-600">Páginas modernas y atractivas.</p>
            </div>

            <div class="bg-white p-8 rounded-lg shadow-md text-center hover:-translate-y-1 transition duration-300">
                <h3 class="text-xl font-bold text-blue-600 mb-4">Marketing</h3>
                <p class="text-gray-600">Llega a más clientes potenciales.</p>
            </div>

            <div class="bg-white p-8 rounded-lg shadow-md text-center hover:-translate-y-1 transition duration-300">
                <h3 class="text-xl font-bold text-blue-600 mb-4">Soporte</h3>
                <p class="text-gray-600">Atención 24/7 para tus proyectos.</p>
            </div>

        </section>
    </main>

</body>
</html>
