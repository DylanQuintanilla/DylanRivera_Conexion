<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>diferencia grid y flex</title>
</head>
<body>
    <h2>1. Flexbox (Unidimensional - Se adapta al contenido)</h2>
    <div class="flex-container">
        <div class="box">Texto Corto</div>
        <div class="box">Texto Mucho Más Largo Que El Resto</div>
        <div class="box">Texto</div>
    </div>

    <h2>2. Grid (Bidimensional - Impone la estructura)</h2>
    <div class="grid-container">
        <div class="box">Texto Corto</div>
        <div class="box">Texto Mucho Más Largo Que El Resto</div>
        <div class="box">Texto</div>
    </div>
</body>
</html>
