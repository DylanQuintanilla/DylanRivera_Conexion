<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Veterinario</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="contenedor-maestro">
        
        <header>
            <h1>Veterinaria "Huellitas Felices" - Panel de Control</h1>
        </header>

        <aside>
            <h2>Menú Principal</h2>
            <ul>
                <li>Mis Pacientes</li>
                <li>Citas Médicas</li>
                <li>Historial Clínico</li>
                <li>Configuración</li>
            </ul>
        </aside>

        <main>
            <article class="tarjeta">
                <span class="icono">🩺</span>
                <h3>Consulta General</h3>
                <button>Agendar</button>
            </article>
            
            <article class="tarjeta">
                <span class="icono">💉</span>
                <h3>Vacunación</h3>
                <button>Ver Esquema</button>
            </article>
            
            <article class="tarjeta">
                <span class="icono">✂️</span>
                <h3>Peluquería</h3>
                <button>Reservar</button>
            </article>
        </main>

        <footer>
            <p>&copy; 2026 Portal de Gestión Veterinaria. Todos los derechos reservados.</p>
        </footer>

    </div>
</body>
</html>
